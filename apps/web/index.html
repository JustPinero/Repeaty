<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#7bbf3a" />
    <meta name="description" content="Repeat after Peaty — flashcards, comprehension drills, and pronunciation feedback in one place." />

    <!-- PWA manifest. The 192/512/maskable PNG icons land in 6.5 alongside
         the Lighthouse pass; v1 uses the welcome-pose JPG as a fallback. -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- iOS Safari has no `beforeinstallprompt`; these meta tags + the
         apple-touch-icon make Add-to-Home-Screen render with the right
         look. The InstallHint pill nudges the user into the flow. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Repeaty" />
    <link rel="apple-touch-icon" href="/peaty/peat-start.jpg" />

    <title>Repeaty</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
